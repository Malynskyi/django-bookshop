{% extends 'books/base.html' %}
{% block content %}
<h2>Delete book "{{ object.title }}"?</h2>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, delete</button>
    <a href="{% url 'books:list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
